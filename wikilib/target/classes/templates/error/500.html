<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Error del servidor</title>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">

    <style>

        body{
            background:#f4f1ea;
            font-family:'Cormorant Garamond', serif;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            background:white;
            padding:40px;
            border:1px solid #d6d1c4;
            border-radius:6px;
            box-shadow:0 4px 15px rgba(0,0,0,0.08);
            text-align:center;
            max-width:500px;
        }

        h1{
            font-size:32px;
            color:#3e3a34;
            margin-bottom:10px;
        }

        p{
            font-size:18px;
            color:#3e3a34;
            margin-bottom:20px;
        }

        a{
            padding:10px 20px;
            background:#8c7a5b;
            color:white;
            text-decoration:none;
            border-radius:4px;
        }

        a:hover{
            background:#6f6148;
        }

    </style>

</head>

<body>

<div class="card">

    <h1>Error 500</h1>

    <p>Ha ocurrido un error interno en WikiLib.</p>

    <p>El sistema no pudo procesar la solicitud.</p>

    <a href="/login">Volver al inicio</a>

</div>

</body>
</html>
