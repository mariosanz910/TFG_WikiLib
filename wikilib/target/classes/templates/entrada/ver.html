<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${entrada.titulo} + ' - WikiLib'">Entrada - WikiLib</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background-color: #f4f1ea;
            font-family: 'Cormorant Garamond', serif;
            padding: 20px;
        }

        .header {
            background-color: #ffffff;
            border: 1px solid #d6d1c4;
            border-radius: 6px;
            padding: 20px 30px;
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }

        .header a {
            color: #8c7a5b;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
        }

        .header a:hover {
            text-decoration: underline;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 600;
            color: #3e3a34;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .entrada-card {
            background-color: #ffffff;
            border: 1px solid #d6d1c4;
            border-radius: 6px;
            padding: 40px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            margin-bottom: 25px;
        }

        .entrada-titulo {
            font-size: 32px;
            font-weight: 600;
            color: #3e3a34;
            margin-bottom: 15px;
        }

        .entrada-meta {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e8e5dd;
            font-size: 16px;
            color: #8c7a5b;
        }

        .badge {
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
        }

        .badge-categoria {
            background-color: #8c7a5b;
            color: white;
        }

        .badge-valoracion {
            background-color: #5c7a4d;
            color: white;
        }

        .entrada-contenido {
            font-size: 18px;
            line-height: 1.8;
            color: #3e3a34;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .valoracion-section {
            background-color: #ffffff;
            border: 1px solid #d6d1c4;
            border-radius: 6px;
            padding: 25px 40px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }

        .valoracion-section h3 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #3e3a34;
        }

        .valoracion-numero {
            font-size: 36px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #3e3a34;
        }

        .valoracion-numero.positivo {
            color: #5c7a4d;
        }

        .valoracion-numero.negativo {
            color: #b85450;
        }

        .vote-buttons {
            display: flex;
            gap: 15px;
        }

        .btn {
            padding: 10px 25px;
            border: 1px solid #8c7a5b;
            background-color: #8c7a5b;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-family: 'Cormorant Garamond', serif;
            text-decoration: none;
            display: inline-block;
            transition: background-color 0.2s ease;
        }

        .btn:hover {
            background-color: #6f6148;
        }

        .btn-like {
            background-color: #5c7a4d;
            border-color: #5c7a4d;
        }

        .btn-like:hover {
            background-color: #4a6339;
        }

        .btn-like.activo {
            background-color: #3d5330;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.3);
        }

        .btn-dislike {
            background-color: #b85450;
            border-color: #b85450;
        }

        .btn-dislike:hover {
            background-color: #a04440;
        }

        .btn-dislike.activo {
            background-color: #8a3a37;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.3);
        }

        .aviso {
            color: #8c7a5b;
            font-size: 16px;
            font-style: italic;
        }

        .aviso a {
            color: #8c7a5b;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 10px;
            }

            .entrada-card,
            .valoracion-section {
                padding: 25px;
            }

            .vote-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

    <div class="header">
        <a href="/catalogo">Catálogo</a>
        <h1>WikiLib</h1>
    </div>

    <div class="container">

        <!-- Contenido de la entrada -->
        <div class="entrada-card">
            <h1 class="entrada-titulo" th:text="${entrada.titulo}">Titulo</h1>

            <div class="entrada-meta">
                <span>Autor: <strong th:text="${entrada.usuario.nombreUsuario}">autor</strong></span>
                <span th:if="${entrada.categoria != null}" class="badge badge-categoria"
                    th:text="${entrada.categoria.nombre}">Categoria</span>
                <span>Publicado: <span
                        th:text="${#temporals.format(entrada.fechaPublicacion, 'dd/MM/yyyy')}">fecha</span></span>
                <span class="badge badge-valoracion" th:text="'Valoración: ' + ${entrada.valoracion}">0</span>
            </div>

            <div class="entrada-contenido" th:text="${entrada.contenido}">
                Contenido de la entrada
            </div>
        </div>

        <!-- Valoracion -->
        <div class="valoracion-section">
            <h3>Valoración</h3>

            <div class="valoracion-numero"
                th:classappend="${entrada.valoracion > 0 ? 'positivo' : (entrada.valoracion < 0 ? 'negativo' : '')}"
                th:text="${entrada.valoracion}">0</div>

            <!-- Usuario autenticado y no es el autor -->
            <div sec:authorize="isAuthenticated()" th:if="${!esPropia}">
                <div class="vote-buttons">
                    <form th:action="@{/valoracion/like/{id}(id=${entrada.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="btn btn-like"
                            th:classappend="${valoracionUsuario != null and valoracionUsuario.tipo.name() == 'LIKE'} ? ' activo' : ''">
                            Me gusta
                        </button>
                    </form>
                    <form th:action="@{/valoracion/dislike/{id}(id=${entrada.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="btn btn-dislike"
                            th:classappend="${valoracionUsuario != null and valoracionUsuario.tipo.name() == 'DISLIKE'} ? ' activo' : ''">
                            No me gusta
                        </button>
                    </form>
                </div>
            </div>

            <!-- Es el propio autor -->
            <p sec:authorize="isAuthenticated()" th:if="${esPropia}" class="aviso">
                No puedes votar tu propia entrada.
            </p>

            <!-- Sin sesion -->
            <p sec:authorize="!isAuthenticated()" class="aviso">
                <a href="/login">Inicia sesión</a> para valorar esta entrada.
            </p>
        </div>

    </div>
</body>

</html>
