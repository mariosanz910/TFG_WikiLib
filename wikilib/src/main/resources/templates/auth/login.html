<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - WikiLib</title>

    <!-- Fuente elegante estilo clásico -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f4f1ea;
            font-family: 'Cormorant Garamond', serif;
        }

        .card {
            width: 360px;
            padding: 40px 35px;
            background-color: #ffffff;
            border: 1px solid #d6d1c4;
            border-radius: 6px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }

        .title {
            text-align: center;
            margin-bottom: 30px;
            font-size: 26px;
            font-weight: 600;
            color: #3e3a34;
        }

        .field {
            position: relative;
            margin-bottom: 20px;
        }

        /* ESTILO DEL ICONO SVG */
        .input-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            fill: #8c7a5b;
            pointer-events: none;
        }

        .input-field {
            width: 100%;
            padding: 10px 12px 10px 36px; /* espacio para el icono */
            border: 1px solid #c8c2b5;
            border-radius: 4px;
            font-size: 16px;
            font-family: 'Cormorant Garamond', serif;
            background-color: #faf8f4;
            color: #3e3a34;
        }

        .input-field:focus {
            outline: none;
            border-color: #8c7a5b;
            background-color: #ffffff;
        }

        .btn {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: 1px solid #8c7a5b;
            background-color: #8c7a5b;
            color: white;
            font-size: 16px;
            font-family: 'Cormorant Garamond', serif;
            cursor: pointer;
            border-radius: 4px;
            transition: background-color 0.2s ease;
        }

        .btn:hover {
            background-color: #6f6148;
        }

        .error {
            background-color: #f8e5e5;
            border: 1px solid #d8a8a8;
            padding: 8px;
            margin-bottom: 15px;
            font-size: 14px;
            color: #7a2e2e;
            border-radius: 4px;
            text-align: center;
        }

        .success {
            background-color: #e7f3e7;
            border: 1px solid #a8cfa8;
            padding: 8px;
            margin-bottom: 15px;
            font-size: 14px;
            color: #2f5e2f;
            border-radius: 4px;
            text-align: center;
        }

        .registro-link {
            margin-top: 20px;
            text-align: center;
            font-size: 15px;
            color: #3e3a34;
        }

        .registro-link a {
            color: #8c7a5b;
            text-decoration: none;
            font-weight: 600;
        }

        .registro-link a:hover {
            text-decoration: underline;
        }

        @media (max-width: 420px) {
            .card {
                width: 90%;
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>

<div class="card">
    <h4 class="title">WikiLib - Iniciar Sesión</h4>

    <!-- Mensaje de error -->
    <div th:if="${param.error}" class="error">
        Usuario o contraseña incorrectos
    </div>


    <form th:action="@{/login}" method="post">

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <!-- USUARIO -->
        <div class="field">
            <svg class="input-icon" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
                <path d="M207.8 20.73c-93.45 18.32-168.7 93.66-187 187.1c-27.64 140.9 68.65 266.2 199.1 285.1c19.01 2.888 36.17-12.26 36.17-31.49l.0001-.6631c0-15.74-11.44-28.88-26.84-31.24c-84.35-12.98-149.2-86.13-149.2-174.2c0-102.9 88.61-185.5 193.4-175.4c91.54 8.869 158.6 91.25 158.6 183.2z"></path>
            </svg>
            <input
                    class="input-field"
                    type="text"
                    name="username"
                    placeholder="Nombre de usuario"
                    required>
        </div>

        <!-- CONTRASEÑA -->
        <div class="field">
            <svg class="input-icon" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
                <path d="M80 192V144C80 64.47 144.5 0 224 0C303.5 0 368 64.47 368 144V192H384C419.3 192 448 220.7 448 256V448C448 483.3 419.3 512 384 512H64C28.65 512 0 483.3 0 448V256C0 220.7 28.65 192 64 192H80z"></path>
            </svg>
            <input
                    class="input-field"
                    type="password"
                    name="password"
                    placeholder="Contraseña"
                    required>
        </div>

        <button class="btn" type="submit">Entrar</button>

    </form>

    <div class="registro-link">
        <p>¿No tienes cuenta? <a th:href="@{/registro}">Regístrate aquí</a></p>
    </div>
</div>

</body>
</html>
